<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Quiksight</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .hero-gradient { background: linear-gradient(180deg, #F5FEFD 0%, #ffffff 100%); }
  </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col text-slate-900 hero-gradient">
  
  <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <a href="/" class="flex items-center gap-2">
          <span class="font-bold text-2xl text-cyan-900 tracking-tight">Quiksight</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
      <div class="p-8">
        <h2 class="text-2xl font-bold text-slate-900 text-center mb-6">Create an Account</h2>
        
        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-red-50 text-red-600 text-sm font-medium border border-red-100">
          {{ error }}
        </div>
        {% endif %}

        <form action="/signup" method="post" class="space-y-4">
          <div>
            <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
            <input type="text" id="username" name="username" required
              class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition shadow-sm placeholder:text-slate-400"
              placeholder="dataexplorer99">
          </div>
          <div>
            <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address</label>
            <input type="email" id="email" name="email" required
              class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition shadow-sm placeholder:text-slate-400"
              placeholder="you@example.com">
          </div>
          <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
            <input type="password" id="password" name="password" required
              class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition shadow-sm placeholder:text-slate-400"
              placeholder="••••••••">
            <p class="text-xs text-slate-500 mt-2">Passwords must be at least 6 characters long.</p>
          </div>
          <button type="submit" class="w-full py-3.5 px-4 rounded-xl bg-cyan-900 text-white font-bold shadow-lg shadow-cyan-900/15 hover:bg-cyan-800 transition transform active:scale-[0.98] mt-6">
            Sign Up
          </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-slate-500">
          Already have an account? <a href="/login" class="font-semibold text-cyan-700 hover:text-cyan-900 transition">Sign in instead</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
